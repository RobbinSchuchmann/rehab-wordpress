; Bumped upload limits so plugin/theme/media uploads through the WP
; admin work without hitting "exceeds upload_max_filesize". Mounted
; into the wp container at /usr/local/etc/php/conf.d/zz-uploads.ini
; via docker-compose.yml.
upload_max_filesize = 128M
post_max_size       = 128M
memory_limit        = 512M
max_execution_time  = 300
max_input_time      = 300
