name: Deploy to Cloudways

# git = code, server = content. Ships only the allowlist in
# scripts/deploy-to-cloudways.sh — never the dangerous dev mu-plugins.

on:
  push:
    branches: [main]
    # The brand auto-deployed on push is set by the `DEPLOY_BRAND` repo variable
    # (default 'diamond'). Only the shared engine + that brand's child theme are
    # watched. When a second brand gets its own Cloudways server, add its
    # `themes/<brand>-child/**` path here and move the deploy job to a matrix so
    # the right brand routes to the right server (see "Deploy allowlist" below).
    paths:
      - 'wp-content-dev/themes/rehab-parent/**'
      - 'wp-content-dev/themes/diamond-child/**'
      - 'wp-content-dev/plugins/rehab-blocks/**'
      - 'wp-content-dev/mu-plugins/zz-contact-form.php'
      - 'wp-content-dev/mu-plugins/zz-intake-form.php'
      - 'wp-content-dev/mu-plugins/zz-redirects.php'
      - 'wp-content-dev/mu-plugins/zz-mail-from.php'
      - 'scripts/deploy-to-cloudways.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand to deploy (themes/<brand>-child)'
        type: string
        default: diamond
      dry_run:
        description: 'Dry run (preview, no changes)'
        type: boolean
        default: false

concurrency:
  # Per-brand so deploys to different brands' servers don't block each other.
  group: deploy-cloudways-${{ inputs.brand || vars.DEPLOY_BRAND || 'diamond' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write deploy key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.CLOUDWAYS_SSH_KEY }}" > ~/.ssh/cw_deploy
          chmod 600 ~/.ssh/cw_deploy

      # Single-brand today (Diamond is the only Cloudways server). The script is
      # brand-parameterized via BRAND; to add a brand, give it its own server
      # secrets and convert this step to a matrix, e.g.:
      #   strategy: { matrix: { brand: [diamond, anker] } }
      # reading each brand's host/user/path from per-brand secrets. (GitHub's
      # secrets context can't be indexed by a dynamic name, so store each brand's
      # target as one JSON secret — DEPLOY_TARGET_<BRAND> — and fromJSON() it.)
      - name: Deploy allowlist
        env:
          BRAND: ${{ inputs.brand || vars.DEPLOY_BRAND || 'diamond' }}
          DEPLOY_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          DEPLOY_USER: ${{ secrets.CLOUDWAYS_USER }}
          DEPLOY_PATH: ${{ secrets.CLOUDWAYS_PATH }}
          DEPLOY_SSH_KEY: /home/runner/.ssh/cw_deploy
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: |
          chmod +x scripts/deploy-to-cloudways.sh
          ./scripts/deploy-to-cloudways.sh
